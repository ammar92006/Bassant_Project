<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/public/favicon.png">`n		<title>Bloomy | Staff Profile</title>
    <link rel="stylesheet" href="/src/styles/design-system.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .profile-layout {
            max-width: 800px;
            margin: 5rem auto;
            padding: 0 2rem;
            animation: slideUp 0.5s ease;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }
        
        .header-title {
            font-size: 2.5rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .header-title i { color: var(--primary-color); }
        
        .profile-card {
            margin-bottom: 3rem;
        }
        
        .profile-header-sec {
            display: flex;
            align-items: center;
            gap: 3rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        
        .profile-img-container {
            position: relative;
            width: 15rem;
            height: 15rem;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--primary-color);
            background: var(--input-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-img-fallback {
            font-size: 6rem;
            color: var(--text-gray);
        }
        
        .upload-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.6);
            padding: 1rem 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0;
        }
        
        .profile-img-container:hover .upload-overlay { opacity: 1; }
        .upload-overlay i { color: white; font-size: 2rem; }
        
        .profile-user-info h2 {
            font-size: 2.5rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }
        
        .profile-user-info p {
            font-size: 1.4rem;
            color: var(--text-gray);
            margin-bottom: 1rem;
        }
        
        .role-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(33, 150, 243, 0.15);
            color: var(--info-color);
            border-radius: 2rem;
            font-size: 1.2rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="ds-toast-container" id="toastContainer"></div>

    <div class="profile-layout">
        <div class="header">
            <h1 class="header-title"><i class="fas fa-user-circle"></i> My Profile</h1>
            <button class="ds-btn ds-btn-danger" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
        
        <div class="ds-card profile-card">
            <div class="profile-header-sec">
                <div class="profile-img-container">
                    <img src="" alt="Profile" class="profile-img" id="profileImage" style="display:none;">
                    <i class="fas fa-user profile-img-fallback" id="profileFallback"></i>
                    <label class="upload-overlay">
                        <i class="fas fa-camera"></i>
                        <input type="file" id="imageUpload" accept="image/*" style="display:none;">
                    </label>
                </div>
                <div class="profile-user-info">
                    <h2 id="displayFullName">Loading...</h2>
                    <p id="displayEmail">loading@bloomy.com</p>
                    <span class="role-badge" id="displayRole">USER</span>
                </div>
            </div>
            
            <form id="profileForm">
                <div class="ds-card-header" style="margin-bottom:2rem; padding-bottom:1rem;">
                    <h3 class="ds-card-title"><i class="fas fa-id-card"></i> Personal Information</h3>
                </div>
                
                <div class="form-grid">
                    <div class="ds-form-group">
                        <label class="ds-label">First Name</label>
                        <input type="text" class="ds-input" id="firstName" required>
                    </div>
                    <div class="ds-form-group">
                        <label class="ds-label">Last Name</label>
                        <input type="text" class="ds-input" id="lastName" required>
                    </div>
                </div>
                
                <div class="form-grid">
                    <div class="ds-form-group">
                        <label class="ds-label">Phone Number</label>
                        <input type="tel" class="ds-input" id="phone">
                    </div>
                    <div class="ds-form-group">
                        <label class="ds-label">Date of Birth</label>
                        <input type="date" class="ds-input" id="dob">
                    </div>
                </div>
                
                <div class="ds-form-group" style="margin-top: 1rem;">
                    <button type="submit" class="ds-btn ds-btn-primary" id="saveProfileBtn">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
        
        <div class="ds-card profile-card">
            <div class="ds-card-header" style="margin-bottom:2rem; padding-bottom:1rem;">
                <h3 class="ds-card-title"><i class="fas fa-lock"></i> Security</h3>
            </div>
            
            <form id="passwordForm">
                <div class="ds-form-group">
                    <label class="ds-label">New Password</label>
                    <input type="password" class="ds-input" id="newPassword" placeholder="Leave blank to keep current password" minlength="10">
                </div>
                <div class="ds-form-group">
                    <label class="ds-label">Confirm New Password</label>
                    <input type="password" class="ds-input" id="confirmPassword">
                </div>
                
                <div class="ds-form-group">
                    <button type="submit" class="ds-btn ds-btn-secondary" id="savePasswordBtn">
                        <i class="fas fa-key"></i> Update Password
                    </button>
                </div>
            </form>
        </div>
        
    </div>

    <script type="module" src="/src/pages/staff-profile.js"></script>
</body>
</html>
